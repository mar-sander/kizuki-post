<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KizKi Post｜気づきを築く共有メモ</title>
<link rel="icon" href="https://raw.githubusercontent.com/mar-sander/assets/refs/heads/main/favicon.ico">

<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap');

:root{
  --bg:#cdc8b2;
  --paper:#f4f1ea;
  --ink:#514f46;
  --sub:#77746b;
  --line:#b9b4aa;
  --dark:#514f46;
  --accent:#111;
  --success:#4c915aed;
  --warn:#cb6a52;
  --warn-bg:#e3decaeb;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  padding:24px;
  padding-top: 40px;
  font-family:"Inter", sans-serif;
  background:var(--bg);
  background-size:5px 5px;
  color:var(--ink);
  letter-spacing:0.08em;
  line-height:1.7;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    linear-gradient(rgba(80,76,66,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(80,76,66,.05) 1px, transparent 1px);
  background-size:5px 5px;
  z-index:9999;
}

.container{
  max-width:760px;
  margin:0 auto;
}

header{
  margin-bottom:24px;
  border-bottom:1px solid var(--dark);
  padding-bottom:16px;
}

h1{
  margin:0;
  font-size:40px;
  line-height:1;
  letter-spacing:0.2em;
  font-weight:300;
  text-transform:none;
  text-shadow:.3rem .3rem 0 rgb(77 73 62 / 22%);
}

.logo-i{
  display:inline-block;
  transform:translateY(-1px);
}

.subtitle{
  margin-top:10px;
  color:var(--sub);
  font-size:13px;
  letter-spacing:.04em;
}

.card{
  background:#dad4bc;
  box-shadow:6px 6px 0 rgba(47,46,42,.12);
  padding:18px;
  margin:20px 0 25px 0;
}

h2{
  margin:-18px -18px 18px -18px;
  font-size:20px;
  letter-spacing:0.1em;
  line-height:1.0;
  background-color:#514f46;
  padding:11px 10px 10px 15px;
  color:#dad4bc;
  font-weight:300;
}

label{
  display:block;
  margin:14px 0 4px;
  color:var(--sub);
  font-size:12px;
  font-weight:400;
  letter-spacing:.12em;
}

select,
textarea{
  width:100%;
  border:1px solid #0000000f;
  background:#00000014;
  color:var(--ink);
  padding:14px;
  font-family:"Inter", sans-serif;
  font-size:16px;
  line-height:1.8;
  outline:none;
}

select:focus,
textarea:focus{
  border-color:#e3decb;
  box-shadow:0 0 0 3px rgba(47,46,42,.22);
}

textarea{
  min-height:220px;
  resize:vertical;
  font-family:"Inter", "Fira Code", monospace, sans-serif;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:12px;
}

button,
.link-button{
  border:0;
  background:var(--dark);
  color:#dad4bc;
  padding:9px 16px;
  font-family:inherit;
  font-size:15px;
  letter-spacing:0.1em;
  cursor:pointer;
  transition:.15s;
  text-decoration:none;
  display:inline-block;
}

button:hover,
.link-button:hover{
  transform:translateY(-1px);
  filter:brightness(1.08);
}

button.secondary,
.link-button.secondary{
  background:#b4b09c;
  color:var(--dark);
}

button:disabled{
  opacity:.55;
  cursor:not-allowed;
  transform:none;
}

.note{
  color:var(--sub);
  font-size:13px;
  margin-top:8px;
}

.status-box{
  border:1px solid #0000000f;
  background:#00000014;
  padding:12px 14px;
  margin-top:14px;
  font-size:14px;
}

.status-box.ready{ color:var(--sub); }
.status-box.sending{ color:var(--ink); }
.status-box.success{ color:var(--success); font-weight:700; }
.status-box.error{ color:var(--warn); font-weight:700; }

.meta{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-top:12px;
}

.meta-box{
  border:1px solid #0000000f;
  background:#00000014;
  padding:10px;
}

.meta-label{
  color:var(--sub);
  font-size:12px;
  letter-spacing:.08em;
}

.meta-value{
  font-size:20px;
  font-weight:400;
  line-height:1.3;
}


.team-memos{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--line);
}

.memo-toggle{
  background:transparent;
  color:var(--ink);
  border:1px solid #00000018;
  padding:8px 12px;
  font-size:13px;
  letter-spacing:.08em;
}

.memo-toggle:hover{
  background:#0000000d;
}

.team-memo-panel{
  margin-top:12px;
  margin-bottom: 6px;
  /* padding:12px; */
  /* border:1px solid #00000012; */
  /* background:#0000000b; */
}

.memo-list-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.memo-list-title{
  color:var(--sub);
  font-size:12px;
  letter-spacing:.12em;
}

.memo-reload{
  background:#b4b09c;
  color:var(--dark);
  padding:5px 10px;
  font-size:12px;
  letter-spacing:.08em;
}

.memo-list-message{
  color:var(--sub);
  font-size:13px;
  margin:8px 0 0;
}

.memo-card{
  margin-top:10px;
  padding:10px 12px;
  background:#0000000b;
  border-left:2px solid #514f4545;
}

.memo-card-time{
  color:var(--sub);
  opacity:.75;
  font-size:10px;
  line-height:1.2;
  letter-spacing:.06em;
  margin-bottom:5px;
}

.memo-card-body{
  color:var(--ink);
  font-size:14px;
  line-height:1.75;
  letter-spacing:.04em;
  white-space:pre-wrap;
  word-break:break-word;
  overflow:hidden;
  transition:max-height .15s ease;
}

.memo-card-body.collapsed{
  max-height:5.25em;
}

.memo-card-body.expanded{
  max-height:none;
}

.memo-link{
  color:var(--ink);
  text-decoration:underline;
  text-underline-offset:3px;
}

.memo-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}

.memo-tag{
  color:var(--sub);
  background:#0000000f;
  padding:2px 6px;
  font-size:10px;
  line-height:1.5;
  letter-spacing:.08em;
}

.memo-more{
  margin-top:4px;
  padding:2px 0;
  background:transparent;
  color:var(--sub);
  border-bottom:1px solid var(--line);
  font-size:12px;
  letter-spacing:.08em;
}

.memo-list-card .team-memos{
  margin-top:14px;
  padding-top:0;
  border-top:none;
}

.memo-list-note{
  margin-top:0;
  margin-bottom:0;
}

.memo-list-card .memo-toggle{
  width:100%;
  text-align:left;
  display:block;
  background:#00000014;
  color:var(--ink);
  border:1px solid #00000018;
  padding:12px 14px;
  font-size:13px;
  letter-spacing:.08em;
}

.memo-list-card .memo-toggle:hover{
  background:#0000001c;
}

.memo-list-card .team-memo-panel{
  margin-top:12px;
}

footer{
  margin-top:32px;
  padding-top:16px;
  border-top:1px solid var(--line);
  color:var(--sub);
  font-size:13px;
  text-align:center;
}

iframe[name="hiddenFrame"]{
  display:none;
}




@media(max-width:640px){
  body{ padding:14px;   padding-top: 28px; }
  h1{ font-size:34px; letter-spacing:0.18em; }
  h2{ margin:-14px -14px 14px -14px; }
  .card{ padding:14px; }
  textarea{ min-height:260px; }
}
</style>
</head>

<body>
<div class="container">
  <header>
    <h1 id="string">KizKi Post</h1>
    <div class="subtitle">気づきを投函、チームで共有。研究を築きあげるメモツール</div>
  </header>

  <section class="card">
    <h2>POST FOAM</h2>

    <form id="postForm" method="POST" target="hiddenFrame">
      <label for="teamSelect">TEAM</label>
      <select id="teamSelect" name="team" required>
        <option value="">チームを選択</option>
        <option value="C-01">C-01</option>
        <option value="C-02">C-02</option>
        <option value="C-03">C-03</option>
        <option value="C-04">C-04</option>
        <option value="C-05">C-05</option>
        <option value="C-06">C-06</option>
        <option value="C-07">C-07</option>
        <option value="C-08">C-08</option>
      </select>

      <label for="memoInput">MEMO</label>
      <textarea id="memoInput" name="memo" maxlength="1000" placeholder="思いついたこと、気になったこと、調べて分かったことを、忘れる前にここへ。" required></textarea>

      <div class="actions">
        <button id="submitBtn" type="submit">POST</button>
      </div>
    </form>

    <div id="statusBox" class="status-box ready">チームを選択、メモを書いてPOSTできます。</div>

    <p class="note">※完成した文章を書く必要はありません。気づきや思いつきを、とりあえず投函しましょう</p>

  </section>

  <section class="card">
    <h2>STATUS</h2>
    <div class="meta">
      <div class="meta-box">
        <div class="meta-label">SELECTED TEAM</div>
        <div class="meta-value" id="selectedTeam">---</div>
      </div>
      <div class="meta-box">
        <div class="meta-label">MEMO LENGTH</div>
        <div class="meta-value"><span id="memoLength">0</span> / 1000</div>
      </div>
      <div class="meta-box">
        <div class="meta-label">LAST POST</div>
        <div class="meta-value" id="lastPost">---</div>
      </div>
    </div>
  </section>



  <section class="card memo-list-card">
    <h2>MEMO LIST</h2>
    <p class="note memo-list-note">選択中のチームに投函されたメモを見返せます。</p>

    <div class="team-memos">
      <button id="memoToggle" class="memo-toggle" type="button" aria-expanded="false">▼ 自チームの投函メモを見る</button>
      <div id="teamMemoPanel" class="team-memo-panel" hidden>
        <div class="memo-list-head">
          <div class="memo-list-title">PAST POSTS</div>
          <button id="reloadMemos" class="memo-reload" type="button">UPDATE</button>
        </div>
        <div id="memoList" class="memo-list">
          <p class="memo-list-message">開いたときに、選択中のチームの投函メモを読み込みます。</p>
        </div>
      </div>
    </div>
  </section>

  <footer>
    Copyright © M.M. All Rights Reserved.
  </footer>
</div>

<iframe name="hiddenFrame" id="hiddenFrame"></iframe>

<script>

class NieRTyping {
  constructor(string) {
    this.string = string;
  }

  call() {
    const result = [];
    for (let i = 0; i <= this.string.length - 1; i += 1) {
      const char = this.string[i];
      const current_string = this.string.slice(0, i);
      const max_type = 3;
      let typed_times = 0;
      let is_equal = true;

      while (is_equal) {

        const random_char = this.get_random();
        const typed = current_string + random_char;
        result.push(typed);

        typed_times += 1;

        if (random_char === char) { is_equal = false; }
        if (typed_times === max_type) {
          is_equal = false;
          result.push(current_string + char);
        }

      }
    }
    return result;
  }

  get_random() {
    const { length } = this.string;
    const index = Math.floor(Math.random() * length);
    return this.string[index];
  }
}

function run() {
  const aodnawg = document.getElementById('string');
  const { innerText } = aodnawg;
  const nier_type = new NieRTyping(innerText);
  const nier_types = nier_type.call();

  let delay = 0;
  for (let nt of nier_types) {
    setTimeout(() => {
      document.getElementById('string').innerText = nt;
    }, delay)
    delay += 40;
  }
}

window.onload = () => {
  run();

  const trigger =document.getElementById('trigger');
  trigger.addEventListener('click', () => {
    run();
  });
};



// ====== Apps ScriptのWebアプリURL ======
const GAS_ENDPOINT = "https://script.google.com/a/macros/g.nagano-c.ed.jp/s/AKfycbzDR6ZrAaPNJ1KKpY28uCrvJhgKHdKIUq5-9MKkYjMkxtp0mk59f-q1HZcegho4muSV_A/exec";
// ==================================================

const form = document.getElementById("postForm");
const teamSelect = document.getElementById("teamSelect");
const memoInput = document.getElementById("memoInput");
const submitBtn = document.getElementById("submitBtn");
const statusBox = document.getElementById("statusBox");
const selectedTeam = document.getElementById("selectedTeam");
const memoLength = document.getElementById("memoLength");
const lastPost = document.getElementById("lastPost");
const hiddenFrame = document.getElementById("hiddenFrame");
const memoToggle = document.getElementById("memoToggle");
const teamMemoPanel = document.getElementById("teamMemoPanel");
const reloadMemos = document.getElementById("reloadMemos");
const memoList = document.getElementById("memoList");
const MEMO_LIST_LIMIT = 25;

let isSubmitting = false;
let isMemoPanelOpen = false;
let memoLoadCount = 0;

function setStatus(message, type = "ready"){
  statusBox.textContent = message;
  statusBox.className = `status-box ${type}`;
}

function updateStatusView(){
  selectedTeam.textContent = teamSelect.value || "---";
  memoLength.textContent = memoInput.value.length;
}



function clearElement(element){
  while(element.firstChild){
    element.removeChild(element.firstChild);
  }
}

function setMemoListMessage(message){
  clearElement(memoList);
  const p = document.createElement("p");
  p.className = "memo-list-message";
  p.textContent = message;
  memoList.appendChild(p);
}

function appendTextWithLinks(container, text){
  const value = String(text || "");
  const urlRegex = /(https?:\/\/[^\s<>"]+)/g;
  let lastIndex = 0;
  let match;

  while((match = urlRegex.exec(value)) !== null){
    const before = value.slice(lastIndex, match.index);
    if(before){
      container.appendChild(document.createTextNode(before));
    }

    const rawUrl = match[0].replace(/[、。)）\]]+$/, "");
    const trailing = match[0].slice(rawUrl.length);
    const link = document.createElement("a");
    link.className = "memo-link";
    link.href = rawUrl;
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    link.textContent = rawUrl;
    container.appendChild(link);

    if(trailing){
      container.appendChild(document.createTextNode(trailing));
    }

    lastIndex = match.index + match[0].length;
  }

  const after = value.slice(lastIndex);
  if(after){
    container.appendChild(document.createTextNode(after));
  }
}

function createMemoCard(post){
  const card = document.createElement("article");
  card.className = "memo-card";

  const time = document.createElement("div");
  time.className = "memo-card-time";
  time.textContent = post.timestamp || "--/-- --:--";
  card.appendChild(time);

  const body = document.createElement("div");
  body.className = "memo-card-body collapsed";
  appendTextWithLinks(body, post.memo || "");
  card.appendChild(body);

  const shouldFold = String(post.memo || "").length > 120 || String(post.memo || "").split("\n").length >= 4;
  if(shouldFold){
    const moreButton = document.createElement("button");
    moreButton.type = "button";
    moreButton.className = "memo-more";
    moreButton.textContent = "もっと読む";
    moreButton.addEventListener("click", () => {
      const expanded = body.classList.toggle("expanded");
      body.classList.toggle("collapsed", !expanded);
      moreButton.textContent = expanded ? "閉じる" : "もっと読む";
    });
    card.appendChild(moreButton);
  }else{
    body.classList.remove("collapsed");
    body.classList.add("expanded");
  }

  const tags = [];
  if(post.category){ tags.push(post.category); }
  if(post.status){ tags.push(post.status); }

  if(tags.length){
    const tagWrap = document.createElement("div");
    tagWrap.className = "memo-tags";
    tags.forEach((label) => {
      const tag = document.createElement("span");
      tag.className = "memo-tag";
      tag.textContent = label;
      tagWrap.appendChild(tag);
    });
    card.appendChild(tagWrap);
  }

  return card;
}

function renderTeamMemos(data){
  clearElement(memoList);

  if(!data || data.result !== "success"){
    setMemoListMessage(data && data.message ? data.message : "メモを読み込めませんでした。");
    return;
  }

  if(!data.posts || !data.posts.length){
    setMemoListMessage("このチームの投函メモはまだありません。");
    return;
  }

  data.posts.forEach((post) => {
    memoList.appendChild(createMemoCard(post));
  });
}

function loadTeamMemos(){
  if(!isMemoPanelOpen){ return; }

  const team = teamSelect.value;
  if(!team){
    setMemoListMessage("先にチームを選択してください。");
    return;
  }

  setMemoListMessage("投函メモを読み込んでいます……");

  const callbackName = `kizkiPostMemoCallback_${Date.now()}_${memoLoadCount++}`;
  const script = document.createElement("script");

  window[callbackName] = (data) => {
    renderTeamMemos(data);
    delete window[callbackName];
    script.remove();
  };

  script.onerror = () => {
    setMemoListMessage("メモを読み込めませんでした。時間をおいて再度お試しください。");
    delete window[callbackName];
    script.remove();
  };

  const params = new URLSearchParams({
    action: "list",
    team,
    limit: String(MEMO_LIST_LIMIT),
    callback: callbackName,
    t: String(Date.now())
  });

  script.src = `${GAS_ENDPOINT}?${params.toString()}`;
  document.body.appendChild(script);
}

function openMemoPanel(){
  isMemoPanelOpen = true;
  teamMemoPanel.hidden = false;
  memoToggle.setAttribute("aria-expanded", "true");
  memoToggle.textContent = "▲ 自チームの投函メモを閉じる";
  loadTeamMemos();
}

function closeMemoPanel(){
  isMemoPanelOpen = false;
  teamMemoPanel.hidden = true;
  memoToggle.setAttribute("aria-expanded", "false");
  memoToggle.textContent = "▼ 自チームの投函メモを見る";
}

function initialize(){
  form.action = GAS_ENDPOINT;

  const savedTeam = localStorage.getItem("kizkiPostTeam");
  if(savedTeam){
    teamSelect.value = savedTeam;
  }

  const savedLastPost = localStorage.getItem("kizkiPostLastPost");
  if(savedLastPost){
    lastPost.textContent = savedLastPost;
  }


  updateStatusView();
}

teamSelect.addEventListener("change", () => {
  localStorage.setItem("kizkiPostTeam", teamSelect.value);
  updateStatusView();
  if(isMemoPanelOpen){
    loadTeamMemos();
  }
});

memoToggle.addEventListener("click", () => {
  if(isMemoPanelOpen){
    closeMemoPanel();
  }else{
    openMemoPanel();
  }
});

reloadMemos.addEventListener("click", loadTeamMemos);

memoInput.addEventListener("input", updateStatusView);


form.addEventListener("submit", (event) => {
  if(!GAS_ENDPOINT || GAS_ENDPOINT.includes("YOUR_APPS_SCRIPT_WEB_APP_URL")){
    event.preventDefault();
    setStatus("GAS_ENDPOINTがまだ設定されていません。", "error");
    return;
  }

  if(!teamSelect.value){
    event.preventDefault();
    setStatus("チームを選択してください。", "error");
    teamSelect.focus();
    return;
  }

  if(!memoInput.value.trim()){
    event.preventDefault();
    setStatus("メモを入力してください。", "error");
    memoInput.focus();
    return;
  }

  localStorage.setItem("kizkiPostTeam", teamSelect.value);
  submitBtn.disabled = true;
  isSubmitting = true;
  setStatus("投函しています……", "sending");
});

hiddenFrame.addEventListener("load", () => {
  if(!isSubmitting) return;

  const now = new Date();
  const timeText = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  localStorage.setItem("kizkiPostLastPost", timeText);
  lastPost.textContent = timeText;

  memoInput.value = "";
  updateStatusView();
  submitBtn.disabled = false;
  isSubmitting = false;
  setStatus("投函しました。", "success");
  if(isMemoPanelOpen){
    setTimeout(loadTeamMemos, 700);
  }
  memoInput.focus();
});

initialize();
</script>
</body>
</html>
